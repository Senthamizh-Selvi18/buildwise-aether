name: BuildWise Aether CI/CD Engine

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
        node-version: ["20.x", "22.x"]
    steps:
      - name: Checkout Source Code Tree
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Context
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Synchronize Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-cov httpx

      - name: Execute Backend Test Suites
        run: |
          cd backend
          pytest --cov=app --cov-report=xml tests/
        env:
          GEMINI_API_KEY: "mock_verification_token_ci_stub"
          ENVIRONMENT: "testing"

      - name: Initialize Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Synchronize Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Validate TypeScript Compilation
        run: |
          cd frontend
          npm run tsc -- --noEmit

      - name: Compile Production Web Bundles
        run: |
          cd frontend
          npm run build

  build-and-ship-containers:
    needs: validate-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Context
        uses: actions/checkout@v4

      - name: Set up Docker Buildx Matrix
        uses: actions/uses/docker-setup-buildx-action@v3

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Transmit Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aether-backend:latest
            ghcr.io/${{ github.repository }}/aether-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max